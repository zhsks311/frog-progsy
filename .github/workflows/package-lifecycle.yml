name: Package lifecycle

# Build the exact Bun-packed tarball ONCE, then install and smoke it across every
# supported OS from that single shared artifact — no per-OS rebuilds. A version-bump
# commit that only touches package.json must still trigger this workflow, so the
# release gate can require a green run for that precise commit.
on:
  pull_request:
    branches: [main, dev]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "gui/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "bunfig.toml"
      - ".github/workflows/package-lifecycle.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "gui/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "bunfig.toml"
      - ".github/workflows/package-lifecycle.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-lifecycle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build tarball once (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: GUI build
        run: bun run build:gui

      - name: Build package tarball
        run: bun run dev:package build --skip-gates

      - name: Stage tarball for upload
        id: tarball
        run: |
          set -euo pipefail
          TARBALL="$(bun run dev:package path)"
          echo "verified tarball=${TARBALL}"
          test -f "$TARBALL"
          mkdir -p dist-tarball
          cp "$TARBALL" dist-tarball/
          echo "name=$(basename "$TARBALL")" >> "$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: package-tarball
          path: dist-tarball/
          if-no-files-found: error
          retention-days: 7

  smoke:
    name: Lifecycle smoke (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.14

      # Reuse the exact tarball built once on ubuntu; the matrix never rebuilds it.
      - name: Download tarball artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: package-tarball
          path: dist-tarball

      - name: Package lifecycle smoke
        run: bun scripts/package-lifecycle-smoke.ts --tarball-dir dist-tarball
