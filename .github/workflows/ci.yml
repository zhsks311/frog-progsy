name: Cross-platform CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "gui/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "bunfig.toml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/package-lifecycle.yml"
      - ".github/workflows/release.yml"
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "gui/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "bunfig.toml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/package-lifecycle.yml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install GUI dependencies
        working-directory: gui
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Test
        run: bun test --isolate ./tests

      - name: Check release helper syntax
        run: bun build scripts/release.ts --target=bun --outdir=.tmp/ci-release-script-check

      - name: GUI build
        run: bun run build:gui

      - name: CLI help smoke
        run: bun run src/cli.ts help

      - name: macOS Keychain lifecycle smoke
        if: runner.os == 'macOS' && runner.environment == 'github-hosted'
        timeout-minutes: 3
        env:
          FROGP_KEYCHAIN_SMOKE: "1"
        run: bun scripts/macos-keychain-lifecycle-smoke.ts

      - name: macOS Keychain smoke cleanup
        if: always() && runner.os == 'macOS' && runner.environment == 'github-hosted'
        timeout-minutes: 2
        env:
          FROGP_KEYCHAIN_SMOKE: "1"
        run: bun scripts/macos-keychain-lifecycle-smoke.ts --cleanup
