name: Release

# Publish frogprogsy to the package registry: triggered from the Actions tab with an explicit
# version, dist-tag, and a dry-run-first default. Bump package.json on main BEFORE dispatching
# (or use `bun run release <version>`, which does the bump+commit+push+dispatch for you); the
# workflow verifies the version matches before publishing.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish — must equal package.json (e.g. 0.1.0)"
        required: true
        type: string
      expected-sha:
        description: "Exact 40-character main commit SHA to release"
        required: true
        type: string
      tag:
        description: "Registry dist-tag"
        required: true
        type: choice
        options:
          - latest
          - preview
        default: latest
      dry-run:
        description: "Dry run (build + pack, no actual publish)"
        required: false
        type: boolean
        default: true
      bootstrap:
        description: "One-time first package publish with NPM_BOOTSTRAP_TOKEN (real publish only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write # create the matching GitHub Release + version tag after npm publish
  actions: read # verify the release commit already passed Cross-platform CI
  id-token: write # OIDC auth for Trusted Publishing + automatic provenance attestation

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # frogprogsy is bun-native (the prepublishOnly GUI build + typecheck run under bun).
      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.14

      # Node + npm exist only in the real-publish lane. registry-url points npm at the public registry.
      - name: Setup Node
        if: ${{ inputs.dry-run != true }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # Trusted Publishing (OIDC) needs npm >= 11.5.1 — the runner's bundled npm may be older.
      - name: Use OIDC-capable npm
        if: ${{ inputs.dry-run != true }}
        run: npm install -g npm@11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify version, channel, and package metadata
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          REGISTRY_DIST_TAG: ${{ inputs.tag }}
          EXPECTED_SHA: ${{ inputs.expected-sha }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[[:alnum:]_.]+)?$ ]] || {
            echo "::error::Invalid release version: $RELEASE_VERSION"
            exit 1
          }

          [[ "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::expected-sha must be a lowercase 40-character commit SHA"
            exit 1
          }
          test "$GITHUB_SHA" = "$EXPECTED_SHA" || {
            echo "::error::Workflow checkout SHA ${GITHUB_SHA} != expected release SHA ${EXPECTED_SHA}"
            exit 1
          }

          case "$REGISTRY_DIST_TAG" in
            latest)
              [[ "$RELEASE_VERSION" != *-* ]] || {
                echo "::error::latest requires a stable SemVer; got ${RELEASE_VERSION}"
                exit 1
              }
              ;;
            preview)
              [[ "$RELEASE_VERSION" == *-* ]] || {
                echo "::error::preview requires a prerelease SemVer; got ${RELEASE_VERSION}"
                exit 1
              }
              ;;
            *)
              echo "::error::Unsupported registry dist-tag: ${REGISTRY_DIST_TAG}"
              exit 1
              ;;
          esac

          PKG=$(bun -e 'console.log((await Bun.file("package.json").json()).version)')
          echo "package.json=$PKG  input=$RELEASE_VERSION"
          test "$PKG" = "$RELEASE_VERSION" || {
            echo "::error::package.json ($PKG) != requested ($RELEASE_VERSION) — bump package.json on main first"
            exit 1
          }

          REPOSITORY=$(bun -e 'console.log((await Bun.file("package.json").json()).repository?.url ?? "")')
          test "$REPOSITORY" = "git+https://github.com/zhsks311/Frogprogsy.git" || {
            echo "::error::package.json repository.url must exactly identify zhsks311/Frogprogsy for npm provenance"
            exit 1
          }

      - name: Require successful CI and package-lifecycle runs for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "::error::Release must run from main; got ${GITHUB_REF}"
            exit 1
          fi

          # Fail closed: BOTH Cross-platform CI and Package lifecycle must have a
          # successful run for THIS exact GITHUB_SHA. A missing workflow run is never
          # treated as success — an empty result aborts the release.
          require_success() {
            workflow="$1"
            run_url="$(
              gh run list \
                --workflow "$workflow" \
                --commit "$GITHUB_SHA" \
                --status success \
                --limit 10 \
                --json conclusion,headSha,url,workflowName \
                --jq '.[0].url // ""'
            )"
            if [ -z "$run_url" ]; then
              echo "::error::No successful ${workflow} run found for ${GITHUB_SHA}. Wait for it to pass before releasing."
              gh run list --workflow "$workflow" --commit "$GITHUB_SHA" --limit 10 || true
              exit 1
            fi
            echo "${workflow} passed for ${GITHUB_SHA}: ${run_url}"
          }

          require_success ci.yml
          require_success package-lifecycle.yml

      # Normal real publishes are tokenless Trusted Publishing (OIDC): npm auto-detects the
      # OIDC environment (`id-token: write` above) and generates provenance automatically.
      # The explicit one-time bootstrap input is the only credential fallback. It is accepted
      # only while the package does not yet exist and requires the scoped NPM_BOOTSTRAP_TOKEN
      # Actions secret. Delete that secret immediately after bootstrap and configure the npm
      # Trusted Publisher for zhsks311/Frogprogsy + release.yml.
      - name: Preflight release metadata
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
          BOOTSTRAP: ${{ inputs.bootstrap }}
          REGISTRY_DIST_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          pkg_name="$(bun -e 'console.log((await Bun.file("package.json").json()).name)')"
          release_tag="v${RELEASE_VERSION}"
          dry_run="${DRY_RUN}"
          bootstrap="${BOOTSTRAP}"

          package_probe_file="$(mktemp)"
          if bun pm view "$pkg_name" name >"$package_probe_file" 2>&1; then
            package_exists=true
          else
            package_probe="$(<"$package_probe_file")"
            case "$package_probe" in
              *"E404"*|*"404 Not Found"*|*"does not exist in this registry"*|*"No match found"*)
                package_exists=false
                ;;
              *)
                echo "::error::Unable to determine whether ${pkg_name} exists in the registry"
                sed 's/^/registry: /' "$package_probe_file"
                exit 1
                ;;
            esac
          fi
          rm -f "$package_probe_file"

          version_exists=false
          if [ "$package_exists" = "true" ]; then
            version_probe_file="$(mktemp)"
            if bun pm view "${pkg_name}@${RELEASE_VERSION}" version >"$version_probe_file" 2>&1; then
              version_exists=true
            else
              version_probe="$(<"$version_probe_file")"
              case "$version_probe" in
                *"E404"*|*"404 Not Found"*|*"does not exist in this registry"*|*"No match found"*)
                  version_exists=false
                  ;;
                *)
                  echo "::error::Unable to determine whether ${pkg_name}@${RELEASE_VERSION} exists"
                  sed 's/^/registry: /' "$version_probe_file"
                  exit 1
                  ;;
              esac
            fi
            rm -f "$version_probe_file"
          fi

          if [ "$bootstrap" = "true" ] && [ "$dry_run" = "true" ]; then
            echo "::error::bootstrap is valid only for a real publish"
            exit 1
          fi
          if [ "$bootstrap" = "true" ] && [ "$REGISTRY_DIST_TAG" != "latest" ]; then
            echo "::error::bootstrap must create the default latest channel"
            exit 1
          fi
          if [ "$dry_run" != "true" ] && [ "$package_exists" = "false" ] && [ "$bootstrap" != "true" ]; then
            echo "::error::${pkg_name} does not exist yet; the first real publish requires bootstrap=true"
            exit 1
          fi
          if [ "$package_exists" = "true" ] && [ "$bootstrap" = "true" ]; then
            echo "::error::bootstrap is one-time only and is forbidden after ${pkg_name} exists"
            exit 1
          fi

          git fetch --force --tags origin

          existing_tag_sha="$(git rev-parse -q --verify "refs/tags/${release_tag}^{commit}" || true)"
          if [ -n "$existing_tag_sha" ] && [ "$existing_tag_sha" != "$GITHUB_SHA" ]; then
            echo "::error::${release_tag} already points at ${existing_tag_sha}, not ${GITHUB_SHA}"
            exit 1
          fi

          if [ -n "$existing_tag_sha" ]; then
            if [ "$dry_run" = "true" ]; then
              echo "::notice::${release_tag} already exists at this commit; dry-run only"
            else
              echo "::error::${release_tag} already exists. Refusing to publish a version with pre-existing Git metadata."
              exit 1
            fi
          fi

          release_probe_file="$(mktemp)"
          if gh release view "$release_tag" --json tagName >"$release_probe_file" 2>&1; then
            release_exists=true
          else
            release_probe="$(<"$release_probe_file")"
            case "$release_probe" in
              *"release not found"*)
                release_exists=false
                ;;
              *)
                echo "::error::Unable to determine whether GitHub Release ${release_tag} exists"
                sed 's/^/github: /' "$release_probe_file"
                exit 1
                ;;
            esac
          fi
          rm -f "$release_probe_file"

          if [ "$release_exists" = "true" ]; then
            if [ "$dry_run" = "true" ]; then
              echo "::notice::GitHub Release ${release_tag} already exists; dry-run only"
            else
              echo "::error::GitHub Release ${release_tag} already exists. Choose the next unused patch version."
              exit 1
            fi
          fi

          if [ "$version_exists" = "true" ]; then
            if [ "$dry_run" = "true" ]; then
              echo "::notice::${pkg_name}@${RELEASE_VERSION} already exists in the registry; dry-run only"
            else
              echo "::error::${pkg_name}@${RELEASE_VERSION} already exists in the registry. Choose the next unused patch version."
              exit 1
            fi
          fi

      - name: Build and validate exact tarball
        env:
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          bun run prepublishOnly
          bun scripts/dev-package.ts build --skip-gates
          TARBALL="$(bun scripts/dev-package.ts path)"
          echo "verified tarball=${TARBALL}"
          echo "TARBALL=${TARBALL}" >> "$GITHUB_ENV"

          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::DRY RUN — validating the exact Bun-built tarball, not publishing"
            bun publish --dry-run "$TARBALL"
          fi

      # Keep the bootstrap credential out of install, build, lifecycle, and dry-run steps.
      # It is exposed only to the final npm process in the explicit one-time bootstrap mode.
      - name: Publish exact tarball
        if: ${{ inputs.dry-run != true }}
        env:
          REGISTRY_DIST_TAG: ${{ inputs.tag }}
          BOOTSTRAP: ${{ inputs.bootstrap }}
          NODE_AUTH_TOKEN: ${{ inputs.bootstrap && secrets.NPM_BOOTSTRAP_TOKEN || '' }}
        run: |
          set -euo pipefail
          if [ "$BOOTSTRAP" = "true" ] && [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::bootstrap requires the scoped NPM_BOOTSTRAP_TOKEN Actions secret"
            exit 1
          fi
          npm publish "$TARBALL" --tag "$REGISTRY_DIST_TAG" --access public

      # Confirm the registry actually has the new version (real publishes only).
      - name: Post-publish registry smoke
        if: ${{ inputs.dry-run != true }}
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          pkg_name="$(bun -e 'console.log((await Bun.file("package.json").json()).name)')"
          for attempt in $(seq 1 30); do
            if VERSION=$(bun pm view "${pkg_name}@${RELEASE_VERSION}" version 2>/dev/null); then
              echo "registry version=$VERSION"
              test "$VERSION" = "$RELEASE_VERSION"
              bun pm view "$pkg_name" dist-tags
              exit 0
            fi
            echo "::notice::${pkg_name}@${RELEASE_VERSION} not visible in the registry yet (attempt $attempt/30)"
            sleep 10
          done
          echo "::error::package registry smoke failed after 30 attempts"
          bun pm view "$pkg_name" versions dist-tags || true
          exit 1

      - name: Create GitHub release
        if: ${{ inputs.dry-run != true }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          REGISTRY_DIST_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          release_tag="v${RELEASE_VERSION}"
          notes_file="$(mktemp)"

          git fetch --force --tags origin

          existing_tag_sha="$(git rev-parse -q --verify "refs/tags/${release_tag}^{commit}" || true)"
          if [ -n "$existing_tag_sha" ] && [ "$existing_tag_sha" != "$GITHUB_SHA" ]; then
            echo "::error::${release_tag} already points at ${existing_tag_sha}, not ${GITHUB_SHA}"
            exit 1
          fi

          previous_tag="$(
            git tag --merged HEAD --list 'v[0-9]*' --sort=-v:refname |
              grep -vx "$release_tag" |
              head -n 1 || true
          )"

          {
            echo "Published to the package registry as \`frogprogsy@${RELEASE_VERSION}\` with dist-tag \`${REGISTRY_DIST_TAG}\`."
            echo
            echo "## Commit log"
            echo
            if [ -n "$previous_tag" ]; then
              echo "Changes since \`${previous_tag}\`:"
              echo
              git log --reverse --no-merges --pretty=format:'- %s (%h)' "${previous_tag}..HEAD" |
                grep -vE '^- release: v[0-9]+\.[0-9]+\.[0-9]+' || true
              echo
              echo
              echo "[Full diff](https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${release_tag})"
            else
              echo "Initial release commits:"
              echo
              git log --reverse --no-merges --pretty=format:'- %s (%h)' HEAD |
                grep -vE '^- release: v[0-9]+\.[0-9]+\.[0-9]+' || true
            fi
          } > "$notes_file"

          if ! grep -q '^- ' "$notes_file"; then
            printf '\n- Release version bump only.\n' >> "$notes_file"
          fi

          if [ -z "$existing_tag_sha" ]; then
            git tag "$release_tag" "$GITHUB_SHA"
            git push origin "refs/tags/${release_tag}"
          fi

          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release edit "$release_tag" --title "$release_tag" --notes-file "$notes_file"
          else
            gh release create "$release_tag" --target "$GITHUB_SHA" --title "$release_tag" --notes-file "$notes_file"
          fi
