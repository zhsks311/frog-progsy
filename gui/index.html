<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>frogprogsy · proxy dashboard</title>
    <script>
      // FOWT guard: apply an explicit light/dark choice before first paint. "system" leaves the
      // attribute unset so color-scheme:light-dark follows the OS. Mirrors App.tsx.
      (function () {
        try {
          var t = localStorage.getItem("frogp-theme");
          if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
